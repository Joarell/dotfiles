<:lua require("nvim-comment-frame").add_multiline_comment()

<html>
<head>
    <title>Plotly Rotated Rectangle</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="myDiv" style="width: 600px; height: 400px;"></div>

    <script>
        // Define the original rectangle corners
        const x0 = 2, y0 = 2; // Bottom-left
        const x1 = 4, y1 = 4; // Top-right

        // Calculate center of the rectangle
        const centerX = (x0 + x1) / 2;
        const centerY = (y0 + y1) / 2;

        // Define the 4 corners of the rectangle relative to the center
        const corners = [
            { x: x0 - centerX, y: y0 - centerY }, // Bottom-left
            { x: x1 - centerX, y: y0 - centerY }, // Bottom-right
            { x: x1 - centerX, y: y1 - centerY }, // Top-right
            { x: x0 - centerX, y: y1 - centerY }  // Top-left
        ];

        // Rotation angle in radians (90 degrees)
        const angle = Math.PI / 2;

        // Rotate each corner
        const rotatedCorners = corners.map(p => {
            return {
                x: p.x * Math.cos(angle) - p.y * Math.sin(angle) + centerX,
                y: p.x * Math.sin(angle) + p.y * Math.cos(angle) + centerY
            };
        });

        // Create the SVG path string from the rotated corners
        // M = Move to, L = Line to, Z = Close path
        const path = 'M ' + rotatedCorners[0].x + ',' + rotatedCorners[0].y +
                     ' L ' + rotatedCorners[1].x + ',' + rotatedCorners[1].y +
                     ' L ' + rotatedCorners[2].x + ',' + rotatedCorners[2].y +
                     ' L ' + rotatedCorners[3].x + ',' + rotatedCorners[3].y +
                     ' Z';

        const layout = {
            title: 'Rotated Rectangle',
            xaxis: { range: [0, 6] },
            yaxis: { range: [0, 6] },
            shapes: [
                // Original Rectangle for reference
                {
                    type: 'rect',
                    x0: x0,
                    y0: y0,
                    x1: x1,
                    y1: y1,
                    line: {
                        color: 'rgba(50, 171, 96, 0.7)',
                        width: 2,
                    },
                    fillcolor: 'rgba(50, 171, 96, 0.2)',
                },
                // Rotated Rectangle using path
                {
                    type: 'path',
                    path: path,
                    line: {
                        color: 'rgba(255, 140, 0, 1)',
                        width: 2,
                    },
                    fillcolor: 'rgba(255, 140, 0, 0.5)',
                }
            ]
        };

        Plotly.newPlot('myDiv', [], layout);
    </script>
</body>
</html>
